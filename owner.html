<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/animations.css">
  <script src="javascript/theme.js"></script>
  <script>
    /* ── Owner-only guard ── */
    (function () {
      try {
        const s = JSON.parse(localStorage.getItem('ds_auth_session'));
        if (!s || s.role !== 'owner') window.location.replace('login.html');
      } catch { window.location.replace('login.html'); }
    })();
  </script>
  <!-- Owner Dashboard styles are in admin.css -->
</head>

<body>

  <!-- ── Nav ── -->
  <nav>
    <div class="nav-logo"><span class="logo-text">Digispex</span><span class="logo-dot"></span></div>
    <span class="nav-badge">Owner Dashboard</span>
    <div class="nav-right">
      <button class="admin-theme-btn" id="adminThemeBtn" onclick="toggleAdminTheme()" title="Switch to Light Mode"><svg
          width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4" />
          <line x1="12" y1="2" x2="12" y2="4" />
          <line x1="12" y1="20" x2="12" y2="22" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="2" y1="12" x2="4" y2="12" />
          <line x1="20" y1="12" x2="22" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg></button>
      <button class="btn-nav" onclick="location.href='index.html'">&#8592; View Store</button>
      <button class="btn-nav logout" onclick="doLogout()">Log Out</button>
    </div>
    </div>
  </nav>

  <!-- ── Hero ── -->
  <div class="owner-hero">
    <div class="owner-hero-inner">
      <div>
        <div class="owner-title">Sales <span>Overview</span></div>
        <div class="owner-sub" id="ownerSub">Loading…</div>
      </div>
      <div class="range-pills">
        <button class="range-pill active" onclick="setRange(7,this)">7 days</button>
        <button class="range-pill" onclick="setRange(30,this)">30 days</button>
        <button class="range-pill" onclick="setRange(90,this)">90 days</button>
        <button class="range-pill" onclick="setRange(0,this)">All time</button>
      </div>
    </div>
  </div>

  <!-- ── Dashboard body ── -->
  <div class="owner-wrap">

    <!-- KPIs -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- Status breakdown -->
    <div class="sec-hdr">Order Status Breakdown</div>
    <div class="status-row" id="statusRow"></div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-box">
        <div class="chart-box-title">Daily Revenue (₱)</div>
        <canvas id="chartRevenue" height="170"></canvas>
      </div>
      <div class="chart-box">
        <div class="chart-box-title">Orders by Status</div>
        <canvas id="chartStatus" height="170"></canvas>
      </div>
    </div>

    <!-- Top products -->
    <div class="sec-hdr">Top Products by Revenue</div>
    <div class="top-tbl-wrap">
      <table class="top-tbl">
        <thead>
          <tr>
            <th>#</th>
            <th>Product</th>
            <th>Units Sold</th>
            <th>Revenue (₱)</th>
          </tr>
        </thead>
        <tbody id="topTbody"></tbody>
      </table>
    </div>

    <!-- Recent orders -->
    <div class="sec-hdr">All Orders</div>
    <div class="orders-wrap">
      <div class="orders-toolbar">
        <span style="font-size:.78rem;color:var(--text3)" id="ordersCount">—</span>
        <div style="display:flex; gap:0.5rem; flex-wrap:wrap">
          <select class="orders-search" id="ordersSort" onchange="filterOrders()">
            <option value="dateDesc">Date: Newest</option>
            <option value="dateAsc">Date: Oldest</option>
            <option value="statusPending">Status: Pending First</option>
            <option value="totalDesc">Total: Highest</option>
            <option value="totalAsc">Total: Lowest</option>
          </select>
          <input class="orders-search" type="text" id="ordersSearch" placeholder="Search order / customer…"
            oninput="filterOrders()">
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="orders-tbl">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total (₱)</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="ordersTbody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /owner-wrap -->

  <!-- Order Details Modal -->
  <div class="modal-overlay" id="orderDetailModal" onclick="if(event.target===this) this.classList.remove('open')">
    <div class="modal modal-sm" style="max-width: 550px">
      <div class="modal-header">
        <h2>Order Details <span id="mdlOrderId"
            style="font-size:0.8rem;color:var(--text3);margin-left:0.5rem;font-family:'JetBrains Mono',monospace"></span>
        </h2>
        <button class="modal-close"
          onclick="document.getElementById('orderDetailModal').classList.remove('open')">&#10005;</button>
      </div>
      <div class="modal-body">
        <div
          style="margin-bottom:1rem;font-size:0.85rem;border-bottom:1px solid var(--border);padding-bottom:1rem;line-height:1.6">
          <div><strong>Customer:</strong> <span id="mdlCust"></span></div>
          <div><strong>Email:</strong> <span id="mdlEmail"></span></div>
          <div><strong>Date:</strong> <span id="mdlDate"></span></div>
          <div><strong>Status:</strong> <span id="mdlStatus" class="ostatus"
              style="float:none;display:inline-block;margin-left:5px"></span></div>
        </div>
        <div style="font-weight:700;margin-bottom:0.5rem;font-size:0.9rem">Items</div>
        <div id="mdlItems"
          style="background:var(--s2);padding:1rem;border-radius:8px;max-height:300px;overflow-y:auto;margin-bottom:1.5rem">
        </div>
        <div
          style="display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:1.1rem;border-top:1px solid var(--border);padding-top:1rem">
          <span>Total</span>
          <span id="mdlTotal" style="color:#16a34a;font-family:'JetBrains Mono',monospace"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="javascript/supabase-client.js"></script>
  <script src="javascript/supabase-sync.js"></script>

  <!-- Chart.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  <script>
    /* ════════════════════════════════════════════════════════
       Digispex — owner.html   (pure localStorage, no backend)
       Read-only sales view for the Owner role.
    ════════════════════════════════════════════════════════ */
    'use strict';

    /* ── Auth ── */
    const SESSION = (() => { try { return JSON.parse(localStorage.getItem('ds_auth_session')); } catch { return null; } })();
    document.getElementById('ownerSub').textContent =
      'Welcome, ' + (SESSION?.name || 'Owner') + ' — read-only view';

    function doLogout() {
      localStorage.removeItem('ds_auth_session');
      window.location.href = 'login.html';
    }

    /* ── helpers ── */
    const PHP_RATE = 57;
    function peso(usd) { return '₱' + Math.round((usd || 0) * PHP_RATE).toLocaleString('en-PH'); }
    function num(v) { return Number(v || 0).toLocaleString(); }
    function showToast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast ' + (type || 'info') + ' show';
      setTimeout(() => el.classList.remove('show'), 2400);
    }

    /* ── Collect ALL orders from localStorage ──────────────
       Orders are stored per-user as: ds_u_<userId>_orders
       and also possibly as: ds_guest_orders
       _getAllOrders() mirrors the logic in admin.js so we get
       the same data the admin sees.
    ─────────────────────────────────────────────────────── */
    function _getAllOrders() {
      const all = [], seen = new Set();
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key || !key.includes('orders')) continue;
        try {
          const arr = JSON.parse(localStorage.getItem(key) || '[]');
          if (!Array.isArray(arr)) continue;
          arr.forEach(o => {
            if (o && o.id && !seen.has(o.id)) { seen.add(o.id); all.push(o); }
          });
        } catch { }
      }
      all.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      return all;
    }

    /* ── State ── */
    let _rangeDays = 7;
    let _allOrders = [];
    let _chartRev = null;
    let _chartSt = null;

    /* ── Range filter ── */
    function setRange(days, btn) {
      document.querySelectorAll('.range-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _rangeDays = days;
      renderDashboard();
    }

    function _inRange(order) {
      if (_rangeDays === 0) return true;
      const d = new Date(order.date || order.createdAt || 0);
      return (Date.now() - d.getTime()) <= _rangeDays * 86400000;
    }

    /* ── Main render ── */
    async function renderDashboard() {
      _allOrders = _getAllOrders();

      const orders = _allOrders.filter(_inRange);
      const active = orders.filter(o => o.status !== 'cancelled');

      /* ── KPIs ── */
      const revenue = active.reduce((s, o) => s + (o.total || 0), 0);
      const nProducts = (() => {
        try {
          const custom = JSON.parse(localStorage.getItem('ds_custom_products') || '[]');
          // PRODUCTS global from catalog.js if available
          const base = typeof PRODUCTS !== 'undefined' ? PRODUCTS.length : 0;
          return base + custom.length;
        } catch { return 0; }
      })();
      const nCustomers = (() => {
        try {
          const users = JSON.parse(localStorage.getItem('ds_auth_users') || '[]');
          return users.filter(u => (u.role || 'customer') === 'customer').length;
        } catch { return 0; }
      })();

      const kpis = [
        { lbl: 'Total Revenue', val: peso(revenue), sub: 'excl. cancelled', c: '#22c55e' },
        { lbl: 'Orders', val: num(orders.length), sub: 'in selected period', c: '#2563eb' },
        { lbl: 'Delivered', val: num(orders.filter(o => o.status === 'delivered').length), sub: 'completed', c: '#22c55e' },
        { lbl: 'Pending', val: num(orders.filter(o => o.status === 'pending' || !o.status).length), sub: 'awaiting action', c: '#f59e0b' },
        { lbl: 'Cancelled', val: num(orders.filter(o => o.status === 'cancelled').length), sub: 'lost orders', c: '#ef4444' },
        { lbl: 'Customers', val: num(nCustomers), sub: 'registered accounts', c: '#8b5cf6' },
        { lbl: 'Products', val: num(nProducts), sub: 'in catalogue', c: '#3b82f6' },
      ];
      document.getElementById('kpiRow').innerHTML = kpis.map(k =>
        `<div class="kpi-card" style="--kc:${k.c}">
      <div class="kpi-lbl">${k.lbl}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`
      ).join('');

      /* ── Status breakdown ── */
      const statusDefs = [
        { key: 'pending', lbl: 'Pending', c: '#f59e0b' },
        { key: 'confirmed', lbl: 'Confirmed', c: '#22c55e' },
        { key: 'processing', lbl: 'Processing', c: '#3b82f6' },
        { key: 'shipped', lbl: 'Shipped', c: '#8b5cf6' },
        { key: 'out_delivery', lbl: 'Out Delivery', c: '#2563eb' },
        { key: 'delivered', lbl: 'Delivered', c: '#22c55e' },
        { key: 'cancelled', lbl: 'Cancelled', c: '#ef4444' },
      ];
      const statusCount = {};
      orders.forEach(o => {
        const k = o.status || 'pending';
        statusCount[k] = (statusCount[k] || 0) + 1;
      });
      document.getElementById('statusRow').innerHTML = statusDefs.map(s =>
        `<div class="status-chip">
      <div class="status-dot" style="background:${s.c}"></div>
      <div class="status-info">
        <div class="s-name">${s.lbl}</div>
        <div class="s-count">${num(statusCount[s.key] || 0)}</div>
      </div>
    </div>`
      ).join('');

      /* ── Daily revenue chart ── */
      const dayMap = {};
      orders.filter(o => o.status !== 'cancelled').forEach(o => {
        const d = (o.date || o.createdAt || '').slice(0, 10);
        if (!d) return;
        dayMap[d] = (dayMap[d] || 0) + (o.total || 0);
      });
      const sortedDays = Object.keys(dayMap).sort();
      const revLabels = sortedDays;
      const revData = sortedDays.map(d => Math.round(dayMap[d] * PHP_RATE));

      if (_chartRev) {
        _chartRev.data.labels = revLabels;
        _chartRev.data.datasets[0].data = revData;
        _chartRev.update();
      } else {
        _chartRev = new Chart(document.getElementById('chartRevenue').getContext('2d'), {
          type: 'line',
          data: {
            labels: revLabels,
            datasets: [{
              label: 'Revenue (₱)', data: revData,
              borderColor: '#7c3aed', backgroundColor: 'rgba(124,58,237,.12)',
              tension: 0.35, fill: true, pointRadius: 3, pointBackgroundColor: '#7c3aed',
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: '#6b7280', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
              y: { ticks: { color: '#6b7280', font: { size: 10 }, callback: v => '₱' + v.toLocaleString() }, grid: { color: 'rgba(255,255,255,.04)' } },
            }
          }
        });
      }

      /* ── Status donut chart ── */
      const stLabels = statusDefs.map(s => s.lbl);
      const stData = statusDefs.map(s => statusCount[s.key] || 0);
      const stColors = statusDefs.map(s => s.c);

      if (_chartSt) {
        _chartSt.data.datasets[0].data = stData;
        _chartSt.update();
      } else {
        _chartSt = new Chart(document.getElementById('chartStatus').getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: stLabels,
            datasets: [{ data: stData, backgroundColor: stColors.map(c => c + '99'), borderColor: stColors, borderWidth: 1.5 }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'right', labels: { color: '#9ca3af', font: { size: 11 }, boxWidth: 12, padding: 10 } }
            }
          }
        });
      }

      /* ── Top products ── */
      const tally = {};
      active.forEach(o => {
        (o.items || []).forEach(item => {
          const n = item.name || item.productId || '?';
          if (!tally[n]) tally[n] = { name: n, qty: 0, rev: 0 };
          tally[n].qty += item.qty || 1;
          tally[n].rev += (item.price || 0) * (item.qty || 1);
        });
      });
      const topProds = Object.values(tally).sort((a, b) => b.rev - a.rev).slice(0, 10);
      const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      document.getElementById('topTbody').innerHTML = topProds.length
        ? topProds.map((p, i) =>
          `<tr>
          <td><span class="rank ${rankClass(i)}">${i + 1}</span></td>
          <td>${p.name}</td>
          <td>${num(p.qty)}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-weight:700;color:#22c55e">${peso(p.rev)}</td>
        </tr>`
        ).join('')
        : `<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:2rem">No sales data yet</td></tr>`;

      /* ── Orders table ── */
      document.getElementById('ordersCount').textContent = num(_allOrders.length) + ' total orders';
      _renderOrderRows(orders);
    }

    function _renderOrderRows(orders) {
      const tbody = document.getElementById('ordersTbody');
      if (!orders.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No orders found.</td></tr>';
        return;
      }
      tbody.innerHTML = orders.slice(0, 150).map(o => {
        const items = o.items || [];
        const preview = items.slice(0, 2).map(i => (i.name || i.productId || '?') + (i.qty > 1 ? ' ×' + i.qty : '')).join(', ')
          + (items.length > 2 ? ' +' + (items.length - 2) + ' more' : '');
        const customer = o.customer || o.userId || '—';
        const st = o.status || 'pending';
        const date = (o.date || o.createdAt || '').slice(0, 16).replace('T', ' ');
        return `<tr style="cursor:pointer" onclick="openOrderDetails('${o.id}')">
      <td><div class="oid">${o.id || '—'}</div></td>
      <td><div class="ocust">${customer}</div></td>
      <td style="max-width:200px;font-size:.78rem;color:var(--text2)">${preview || '—'}</td>
      <td class="ototal">${peso(o.total)}</td>
      <td><span class="ostatus ${st}">${st}</span></td>
      <td class="odate">${date || '—'}</td>
    </tr>`;
      }).join('');
    }

    function filterOrders() {
      const q = (document.getElementById('ordersSearch').value || '').toLowerCase();
      const s = document.getElementById('ordersSort').value || 'dateDesc';

      let filtered = _allOrders.filter(_inRange);

      if (q) {
        filtered = filtered.filter(o =>
          (o.id || '').toLowerCase().includes(q) ||
          (o.customer || '').toLowerCase().includes(q) ||
          (o.userId || '').toLowerCase().includes(q)
        );
      }

      if (s === 'dateDesc') filtered.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
      if (s === 'dateAsc') filtered.sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0));
      if (s === 'totalDesc') filtered.sort((a, b) => (b.total || 0) - (a.total || 0));
      if (s === 'totalAsc') filtered.sort((a, b) => (a.total || 0) - (b.total || 0));
      if (s === 'statusPending') {
        filtered.sort((a, b) => {
          if (a.status === 'pending' && b.status !== 'pending') return -1;
          if (b.status === 'pending' && a.status !== 'pending') return 1;
          return new Date(b.date || 0) - new Date(a.date || 0);
        });
      }

      _renderOrderRows(filtered);
    }

    function openOrderDetails(id) {
      const o = _allOrders.find(x => x.id === id);
      if (!o) return;
      document.getElementById('mdlOrderId').textContent = o.id;
      document.getElementById('mdlCust').textContent = o.customer || o.userId || '—';
      document.getElementById('mdlEmail').textContent = o.email || '—';
      document.getElementById('mdlDate').textContent = (o.date || o.createdAt || '').slice(0, 16).replace('T', ' ');

      const stEl = document.getElementById('mdlStatus');
      stEl.textContent = o.status || 'pending';
      stEl.className = 'ostatus ' + (o.status || 'pending');

      document.getElementById('mdlTotal').textContent = peso(o.total);

      const items = o.items || [];
      document.getElementById('mdlItems').innerHTML = items.length ? items.map(i => `
    <div style="display:flex;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid var(--border)">
      <div>
         <div style="font-weight:600;font-size:0.85rem">${i.name || i.productId || '?'}</div>
         <div style="color:var(--text3);font-size:0.75rem">Qty: ${i.qty || 1} x ${peso(i.price)}</div>
      </div>
      <div style="font-weight:700;font-family:'JetBrains Mono',monospace">${peso((i.price || 0) * (i.qty || 1))}</div>
    </div>
  `).join('') : '<div style="color:var(--text3);font-size:0.8rem">No items found</div>';

      document.getElementById('orderDetailModal').classList.add('open');
    }

    /* ── Boot ── */
    document.addEventListener('DOMContentLoaded', renderDashboard);
  </script>
</body>

</html>
